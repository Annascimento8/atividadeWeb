<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 01</title>
</head>
<body>
    

    <h2>Jogo da Adivinhação</h2>
    <p>O computador escolheu um número entre 1 e 20. Tente adivinhar!</p>

    <label for="palpite">Seu palpite:</label>
    <input type="number" id="palpite" min="1" max="20">
    <button id="botaoPalpite">Enviar</button>
    <button id="botaoReiniciar" style="display: none;">Jogar Novamente</button>

    <p id="mensagem"></p>

    <script src="script.js"></script>
</body>
</html>
